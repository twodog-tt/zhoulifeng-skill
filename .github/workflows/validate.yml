name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check source index
        run: python3 scripts/source_index_check.py

      - name: Check SKILL.md quality
        run: python3 scripts/quality_check.py

      - name: Check evidence map
        run: python3 scripts/evidence_check.py

      - name: Check social speech map
        run: python3 scripts/social_speech_check.py

      - name: Check evaluation run artifacts
        run: python3 scripts/eval_run_check.py

      - name: Check public demo set
        run: python3 scripts/demo_check.py

      - name: Check required docs
        run: python3 scripts/docs_check.py

      - name: Check human review scaffolding
        run: python3 scripts/review_check.py

      - name: Check public demo outputs
        run: python3 scripts/demo_outputs_check.py

      - name: Check archive workflow
        run: python3 scripts/archive_check.py

      - name: Check external review scaffolding
        run: python3 scripts/external_review_check.py

      - name: Check source verification workflow
        run: python3 scripts/source_verification_check.py

      - name: Check launch materials
        run: python3 scripts/launch_materials_check.py

      - name: Check v1.0 planning docs
        run: python3 scripts/v1_plan_check.py

      - name: Validate skill frontmatter
        run: python3 quick_validate.py

      - name: Run fidelity static checks
        run: python3 tests/run_fidelity_check.py
